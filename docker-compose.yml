services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/witelokk/music-api:latest
    container_name: music-api
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      DATABASE_URL: postgres://music_user:music_password@postgres:5432/music_db?sslmode=disable
      REDIS_URL: redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: media
      MINIO_USE_SSL: "false"
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - "80:8080"
    networks:
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: music-postgres
    environment:
      POSTGRES_DB: music_db
      POSTGRES_USER: music_user
      POSTGRES_PASSWORD: music_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: music-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - backend

  minio:
    image: minio/minio:latest
    container_name: music-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  backend:
    driver: bridge
