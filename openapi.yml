openapi: 3.0.3
info:
  title: Music API
  version: 1.0.0
  description: API for a music streaming service

servers:
  - url: /api

tags:
  - name: Auth
    description: Endpoints for sign up, login, verification, and user account management.
  - name: Artists
    description: Endpoints for browsing, searching, and managing artists and their profiles.
  - name: Songs
    description: Endpoints for browsing, searching, and managing songs and track metadata.
  - name: Releases
    description: Endpoints for browsing and managing releases such as albums, singles, and EPs.
  - name: Favorites
    description: Endpoints for viewing, adding, and removing favorite songs for the current user.
  - name: Followings
    description: Endpoints for viewing, following, and unfollowing artists for the current user.
  - name: Media
    description: Endpoints for serving media files such as audio streams and images.
  - name: Playlists
    description: Endpoints for managing user playlists and their songs.
  - name: Search
    description: Endpoints for searching songs, artists, releases and playlists.
  - name: Home
    description: Endpoints for home screen layout.

paths:
  /favorites:
    get:
      tags: [Favorites]
      summary: Get favorite songs
      operationId: getFavorites
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of favorite songs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SongList'
        '500':
          description: Failed to fetch favorite songs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [Favorites]
      summary: Add song to favorites
      operationId: addFavorite
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FavoriteSongRequest'
      responses:
        '204':
          description: Song added to favorites.
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Song not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to add song to favorites.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [Favorites]
      summary: Remove song from favorites
      operationId: removeFavorite
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FavoriteSongRequest'
      responses:
        '204':
          description: Song removed from favorites.
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Song not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to remove song from favorites.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /followings:
    get:
      tags: [Followings]
      summary: Get followed artists
      operationId: getFollowings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of followed artists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtistList'
        '500':
          description: Failed to fetch followed artists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [Followings]
      summary: Follow an artist
      operationId: followArtist
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FollowArtistRequest'
      responses:
        '204':
          description: Artist followed.
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Artist not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to follow artist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [Followings]
      summary: Unfollow an artist
      operationId: unfollowArtist
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FollowArtistRequest'
      responses:
        '204':
          description: Artist unfollowed.
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Artist not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to unfollow artist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /verification-email:
    post:
      tags: [Auth]
      summary: Send verification email
      operationId: sendVerificationEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendVerificationEmailRequest'
      responses:
        '204':
          description: Verification email sent successfully.
        '400':
          description: Invalid request body or email.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Verification code was sent too recently.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to send verification email.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users:
    post:
      tags: [Auth]
      summary: Create user with verification code
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validation error or invalid/expired verification code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: User with this email already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to create user due to server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tokens:
    post:
      tags: [Auth]
      summary: Obtain access and refresh tokens
      operationId: generateTokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetTokensRequest'
      responses:
        '200':
          description: Tokens generated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokensResponse'
        '400':
          description: Validation error, unsupported grant_type, or invalid/expired token or code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to generate tokens due to server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to fetch current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /artists/{id}:
    get:
      tags: [Artists]
      summary: Get artist by ID
      operationId: getArtist
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Artist details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artist'
        '404':
          description: Artist not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to fetch artist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /media/{id}:
    get:
      tags: [Media]
      summary: Get media file
      operationId: getMedia
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Media file bytes.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Media not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to fetch media.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /songs/{id}:
    get:
      tags: [Songs]
      summary: Get song by ID
      operationId: getSong
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Song details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Song'
        '404':
          description: Song not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to fetch song.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /releases/{id}:
    get:
      tags: [Releases]
      summary: Get release by ID
      operationId: getRelease
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Release details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Release'
        '404':
          description: Release not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to fetch release.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /playlists:
    get:
      tags: [Playlists]
      summary: Get a list of playlists
      operationId: getPlaylists
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of playlists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaylistsSummary'
        '500':
          description: Failed to fetch playlists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [Playlists]
      summary: Create a new playlist
      operationId: createPlaylist
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlaylistRequest'
      responses:
        '201':
          description: Playlist created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePlaylistResponse'
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to create playlist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /playlists/{id}:
    get:
      tags: [Playlists]
      summary: Get playlist by ID
      operationId: getPlaylist
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Playlist details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Playlist'
        '404':
          description: Playlist not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to fetch playlist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags: [Playlists]
      summary: Update a playlist
      operationId: updatePlaylist
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlaylistRequest'
      responses:
        '204':
          description: Playlist updated successfully.
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Playlist not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to update playlist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [Playlists]
      summary: Delete a playlist
      operationId: deletePlaylist
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Playlist deleted successfully.
        '404':
          description: Playlist not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to delete playlist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /playlists/{id}/songs:
    get:
      tags: [Playlists]
      summary: Get playlist songs
      operationId: getPlaylistSongs
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of songs in the playlist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SongList'
        '404':
          description: Playlist not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to fetch playlist songs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [Playlists]
      summary: Add song to playlist
      operationId: addSongToPlaylist
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddSongToPlaylistRequest'
      responses:
        '204':
          description: Song added to playlist.
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Playlist or song not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to add song to playlist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [Playlists]
      summary: Remove song from playlist
      operationId: removeSongFromPlaylist
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveSongFromPlaylistRequest'
      responses:
        '204':
          description: Song removed from playlist.
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Playlist or song not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to remove song from playlist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /search:
    get:
      tags: [Search]
      summary: Search songs, artists, releases and playlists
      operationId: search
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: type
          required: false
          schema:
            type: string
            enum: [song, release, artist, playlist]
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          description: Invalid search parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to perform search.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /home-screen-layout:
    get:
      tags: [Home]
      summary: Get home screen layout
      operationId: getHomeScreenLayout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Home screen layout data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeScreenLayout'
        '500':
          description: Failed to fetch home screen layout.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    FavoriteSongRequest:
      type: object
      properties:
        song_id:
          type: string
          format: uuid
      required:
        - song_id

    FollowArtistRequest:
      type: object
      properties:
        artist_id:
          type: string
          format: uuid
      required:
        - artist_id

    SendVerificationEmailRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Email address to send a verification code to.
      required:
        - email

    CreateUserRequest:
      type: object
      properties:
        name:
          type: string
          description: User's display name.
        email:
          type: string
          format: email
          description: User's email address.
        code:
          type: string
          description: Verification code received by email.
      required:
        - name
        - email
        - code

    GetTokensRequest:
      type: object
      description: |
        Request to obtain tokens.
        - For `grant_type` = `code`, `email` and `code` are required.
        - For `grant_type` = `refresh_token`, `refresh_token` is required.
      properties:
        grant_type:
          type: string
          description: Grant type to use.
          enum: [code, refresh_token]
        email:
          type: string
          format: email
          description: User email, required with `grant_type` = `code`.
        code:
          type: string
          description: Verification code, required with `grant_type` = `code`.
        refresh_token:
          type: string
          description: Refresh token, required with `grant_type` = `refresh_token`.
        google_token:
          type: string
          description: Reserved for future Google auth integration.
      required:
        - grant_type

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - created_at

    TokensResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
      required:
        - access_token
        - refresh_token

    CurrentUser:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
      required:
        - name
        - email

    Artist:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        avatar_url:
          type: string
          nullable: true
        cover_url:
          type: string
          nullable: true
        followers:
          type: integer
        following:
          type: boolean
        popularSongs:
          $ref: '#/components/schemas/SongList'
        releases:
          $ref: '#/components/schemas/ReleaseList'
      required:
        - id
        - name
        - followers
        - following
        - popularSongs
        - releases

    ArtistSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        avatar_url:
          type: string
          nullable: true
      required:
        - id
        - name

    ArtistList:
      type: object
      properties:
        count:
          type: integer
        artists:
          type: array
          items:
            $ref: '#/components/schemas/ArtistSummary'
        names:
          type: string
      required:
        - count
        - artists
        - names

    Song:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        cover_url:
          type: string
          nullable: true
        is_favorite:
          type: boolean
        duration_seconds:
          type: integer
        artists:
          type: array
          items:
            $ref: '#/components/schemas/ArtistSummary'
        stream_url:
          type: string
      required:
        - id
        - name
        - is_favorite
        - duration_seconds
        - artists
        - stream_url

    SongList:
      type: object
      properties:
        count:
          type: integer
        songs:
          type: array
          items:
            $ref: '#/components/schemas/Song'
      required:
        - count
        - songs

    Release:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        cover_url:
          type: string
          nullable: true
        type:
          type: string
        released_at:
          type: string
        songs:
          $ref: '#/components/schemas/SongList'
        artists:
          $ref: '#/components/schemas/ArtistList'
      required:
        - id
        - name
        - type
        - released_at
        - songs
        - artists

    ReleaseList:
      type: object
      properties:
        count:
          type: integer
        releases:
          type: array
          items:
            $ref: '#/components/schemas/Release'
      required:
        - count
        - releases

    Playlist:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        cover_url:
          type: string
          nullable: true
        songs_count:
          type: integer
        songs:
          $ref: '#/components/schemas/SongList'
      required:
        - id
        - name
        - songs_count
        - songs

    PlaylistSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        cover_url:
          type: string
          nullable: true
        songs_count:
          type: integer
      required:
        - id
        - name
        - songs_count

    PlaylistsSummary:
      type: object
      properties:
        count:
          type: integer
        playlists:
          type: array
          items:
            $ref: '#/components/schemas/PlaylistSummary'
      required:
        - count
        - playlists

    CreatePlaylistRequest:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    CreatePlaylistResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
      required:
        - id

    UpdatePlaylistRequest:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    AddSongToPlaylistRequest:
      type: object
      properties:
        song_id:
          type: string
          format: uuid
      required:
        - song_id

    RemoveSongFromPlaylistRequest:
      type: object
      properties:
        song_id:
          type: string
          format: uuid
      required:
        - song_id

    Error:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
      required:
        - error

    ReleaseSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        cover_url:
          type: string
          nullable: true
        type:
          type: string
        released_at:
          type: string
      required:
        - id
        - name
        - type
        - released_at

    SearchResultItem:
      type: object
      properties:
        type:
          type: string
          description: Type of the search result.
          enum: [song, release, artist, playlist]
        song:
          $ref: '#/components/schemas/Song'
          nullable: true
        release:
          $ref: '#/components/schemas/ReleaseSummary'
          nullable: true
        artist:
          $ref: '#/components/schemas/ArtistSummary'
          nullable: true
        playlist:
          $ref: '#/components/schemas/PlaylistSummary'
          nullable: true
      required:
        - type

    SearchResponse:
      type: object
      properties:
        query:
          type: string
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchResultItem'
      required:
        - query
        - page
        - limit
        - total
        - results

    HomeScreenSection:
      type: object
      properties:
        title:
          type: string
        title_ru:
          type: string
        releases:
          $ref: '#/components/schemas/ReleaseList'
      required:
        - title
        - title_ru
        - releases

    HomeScreenLayout:
      type: object
      properties:
        playlists:
          $ref: '#/components/schemas/PlaylistsSummary'
        followedArtists:
          $ref: '#/components/schemas/ArtistList'
        sections:
          type: array
          items:
            $ref: '#/components/schemas/HomeScreenSection'
      required:
        - playlists
        - followedArtists
        - sections
