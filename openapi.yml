openapi: 3.0.3
info:
  title: Music API
  version: 1.0.0
  description: Simple auth API for the Music service.

servers:
  - url: /api

paths:
  /verification-email:
    post:
      tags: [Auth]
      summary: Send verification email
      operationId: sendVerificationEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendVerificationEmailRequest'
      responses:
        '204':
          description: Verification email sent successfully.
        '400':
          description: Invalid request body or email.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Verification code was sent too recently.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to send verification email.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users:
    post:
      tags: [Auth]
      summary: Create user with verification code
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validation error or invalid/expired verification code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: User with this email already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to create user due to server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tokens:
    post:
      tags: [Auth]
      summary: Obtain access and refresh tokens
      operationId: generateTokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetTokensRequest'
      responses:
        '200':
          description: Tokens generated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokensResponse'
        '400':
          description: Validation error, unsupported grant_type, or invalid/expired token or code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to generate tokens due to server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to fetch current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /artists/{id}:
    get:
      tags: [Artists]
      summary: Get artist by ID
      operationId: getArtist
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Artist details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artist'
        '404':
          description: Artist not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to fetch artist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /songs/{id}:
    get:
      tags: [Songs]
      summary: Get song by ID
      operationId: getSong
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Song details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Song'
        '404':
          description: Song not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to fetch song.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /releases/{id}:
    get:
      tags: [Releases]
      summary: Get release by ID
      operationId: getRelease
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Release details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Release'
        '404':
          description: Release not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to fetch release.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SendVerificationEmailRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Email address to send a verification code to.
      required:
        - email

    CreateUserRequest:
      type: object
      properties:
        name:
          type: string
          description: User's display name.
        email:
          type: string
          format: email
          description: User's email address.
        code:
          type: string
          description: Verification code received by email.
      required:
        - name
        - email
        - code

    GetTokensRequest:
      type: object
      description: |
        Request to obtain tokens.
        - For `grant_type` = `code`, `email` and `code` are required.
        - For `grant_type` = `refresh_token`, `refresh_token` is required.
      properties:
        grant_type:
          type: string
          description: Grant type to use.
          enum: [code, refresh_token]
        email:
          type: string
          format: email
          description: User email, required with `grant_type` = `code`.
        code:
          type: string
          description: Verification code, required with `grant_type` = `code`.
        refresh_token:
          type: string
          description: Refresh token, required with `grant_type` = `refresh_token`.
        google_token:
          type: string
          description: Reserved for future Google auth integration.
      required:
        - grant_type

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - created_at

    TokensResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
      required:
        - access_token
        - refresh_token

    CurrentUser:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
      required:
        - name
        - email

    Artist:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        avatar_url:
          type: string
          nullable: true
        cover_url:
          type: string
          nullable: true
        followers:
          type: integer
        following:
          type: boolean
        popularSongs:
          $ref: '#/components/schemas/SongList'
        releases:
          $ref: '#/components/schemas/ReleaseList'
      required:
        - id
        - name
        - followers
        - following
        - popularSongs
        - releases

    ArtistSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        avatar_url:
          type: string
          nullable: true
      required:
        - id
        - name

    ArtistList:
      type: object
      properties:
        count:
          type: integer
        artists:
          type: array
          items:
            $ref: '#/components/schemas/ArtistSummary'
        names:
          type: string
      required:
        - count
        - artists
        - names

    Song:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        cover_url:
          type: string
          nullable: true
        is_favorite:
          type: boolean
        duration_seconds:
          type: integer
        artists:
          type: array
          items:
            $ref: '#/components/schemas/ArtistSummary'
        stream_url:
          type: string
      required:
        - id
        - name
        - is_favorite
        - duration_seconds
        - artists
        - stream_url

    SongList:
      type: object
      properties:
        count:
          type: integer
        songs:
          type: array
          items:
            $ref: '#/components/schemas/Song'
      required:
        - count
        - songs

    Release:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        cover_url:
          type: string
          nullable: true
        type:
          type: string
        released_at:
          type: string
        songs:
          $ref: '#/components/schemas/SongList'
        artists:
          $ref: '#/components/schemas/ArtistList'
      required:
        - id
        - name
        - type
        - released_at
        - songs
        - artists

    ReleaseList:
      type: object
      properties:
        count:
          type: integer
        releases:
          type: array
          items:
            $ref: '#/components/schemas/Release'
      required:
        - count
        - releases

    Error:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
      required:
        - error
